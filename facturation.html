<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faturação </title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="facturation.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="btn-card" onclick="goFaturacao()">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        <span>Faturação</span>
    </div>

    <!-- MENU -->
    <div class="menu">

        <button class="btn" onclick="openSection('scan')">
            <i class="fa-solid fa-qrcode"></i> Escanear QR
        </button>

        <button class="btn" onclick="openSection('code')">
            <i class="fa-solid fa-keyboard"></i> Inserir código
        </button>

        <button class="btn" onclick="openSection('history')">
            <i class="fa-solid fa-clock"></i> Histórico
        </button>

    </div>

    <!-- SCAN -->
    <div id="scan" class="section">
        <h3>Escanear QR Code</h3>

        <div id="reader" style="width:100%;"></div>

        <p id="result" style="margin-top:10px;color:#f8c22c;"></p>
    </div>

    <!-- CODE -->
    <div id="code" class="section">
        <h3>Inserir código</h3>
        <input placeholder="Código do produto">
        <button class="action">Validar</button>
    </div>

    <!-- HISTORY -->
    <div id="history" class="section">
        <h3>Histórico</h3>
        <p>Sem dados disponíveis...</p>
    </div>

</div>

<script src="facturation.js"></script>

</body>
</html>
