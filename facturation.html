<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faturação</title>

<link rel="stylesheet" href="facturation.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

    <div class="btn-card" onclick="goFaturacao()">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        <span>Faturação</span>
    </div>

    <!-- MENU -->
    <div class="menu">

        <button class="btn" onclick="openSection('scan')">
            <i class="fa-solid fa-qrcode"></i>
            Escanear QR
        </button>

        <button class="btn" onclick="openSection('code')">
            <i class="fa-solid fa-keyboard"></i>
            Inserir código
        </button>

        <button class="btn" onclick="openSection('history')">
            <i class="fa-solid fa-clock"></i>
            Histórico
        </button>

    </div>

    <!-- SCANNER -->
    <div id="scan" class="section">

        <h3>Escanear QR Code</h3>

        <div id="reader"></div>

        <div id="result" class="result-box"></div>

    </div>

    <!-- CODE -->
    <div id="code" class="section">

        <h3>Inserir código</h3>

        <input
            id="manualCode"
            type="text"
            placeholder="Código do produto">

        <button class="action">
            Validar
        </button>

    </div>

    <!-- HISTORY -->
    <div id="history" class="section">

        <h3>Histórico</h3>

        <p>Sem dados disponíveis...</p>

    </div>

</div>

<script src="facturation.js"></script>

</body>
</html>
